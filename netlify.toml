[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[dev]
command = "npm run dev"
targetPort = 5173
port = 8888
publish = "dist"
functions = "netlify/functions"

[[redirects]]
from = "/api/v1/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/sitemap-parcels.xml"
to = "/.netlify/functions/sitemap-parcels"
status = 200
force = true

[[redirects]]
from = "/dilyanka/*"
to = "/.netlify/functions/seo-page/dilyanka/:splat"
status = 200
force = true

[[redirects]]
from = "/oblast/*"
to = "/.netlify/functions/seo-page/oblast/:splat"
status = 200
force = true

[[redirects]]
from = "/raion/*"
to = "/.netlify/functions/seo-page/raion/:splat"
status = 200
force = true

[[redirects]]
from = "/hromada/*"
to = "/.netlify/functions/seo-page/hromada/:splat"
status = 200
force = true

[[redirects]]
from = "/settlement/*"
to = "/.netlify/functions/seo-page/settlement/:splat"
status = 200
force = true

[[headers]]
for = "/sitemap.xml"
[headers.values]
Content-Type = "application/xml; charset=utf-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap-static.xml"
[headers.values]
Content-Type = "application/xml; charset=utf-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/robots.txt"
[headers.values]
Content-Type = "text/plain; charset=utf-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/favicon.svg"
[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/og-image.svg"
[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/og-image.png"
[headers.values]
Content-Type = "image/png"
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/data/*"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
